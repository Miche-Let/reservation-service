spring:
  application:
    name: reservation-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reservation_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

#  kafka:
#    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}

  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
#eureka:
#  client:
#    service-url:
#      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:19090}/eureka/

feign:
  timeslot-service:
    url: ${FEIGN_TIMESLOT_SERVICE_URL:http://localhost:19400}
  ticket-service:
    url: ${FEIGN_TICKET_SERVICE_URL:http://localhost:19900}

server:
  port: 19500