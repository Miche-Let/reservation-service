server:
  port: ${SERVER_PORT:19500}

spring:
  application:
    name: reservation-service

  management:
    endpoints:
      web:
        exposure:
          include: prometheus, health, info
    metrics:
      tags:
        application: reservation-service

  cache:
    type: redis

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: reservation-service-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  cloud:
    discovery:
      enabled: true

feign:
  client:
    config:
      timeslot-service:
        connectTimeout: ${FEIGN_TIMESLOT_CONNECT_TIMEOUT:3000}
        readTimeout: ${FEIGN_TIMESLOT_READ_TIMEOUT:5000}
      waiting-service:
        connectTimeout: ${FEIGN_WAITING_CONNECT_TIMEOUT:3000}
        readTimeout: ${FEIGN_WAITING_READ_TIMEOUT:5000}

outbox:
  scheduler:
    fixed-delay-ms: ${OUTBOX_SCHEDULER_FIXED_DELAY_MS:1000}

noshow:
  scheduler:
    fixed-delay-ms: ${NOSHOW_SCHEDULER_FIXED_DELAY_MS:60000}

internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET}
