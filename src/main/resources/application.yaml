spring:
  application:
    name: reservation-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:michelet_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: reservation_db
        format_sql: true
        jdbc.time_zone: Asia/Seoul
        jdbc:
          batch_size: 30
          order_inserts: true
          order_updates: true
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
#eureka:
#  client:
#    service-url:
#      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:19090}/eureka/

internal:
  secret: ${INTERNAL_SECRET:dev-secret}

feign:
  timeslot-service:
    url: ${FEIGN_TIMESLOT_SERVICE_URL:http://localhost:19400}
  waiting-service:
    url: ${FEIGN_WAITING_SERVICE_URL:http://localhost:19300}

server:
  port: 19500